<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #1f2937;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 220px;
            background-color: #111827;
            min-height: 100vh;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar a:hover {
            background-color: #1f2937;
            color: white;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            min-width: 250px;
        }

        .card h3 {
            margin-top: 0;
        }

        .card-number {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
        }

        .cards {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        hr {
            border: none;
            height: 1px;
            background: #e5e7eb;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>
        <strong>🏢 Sistema Sucursales</strong>
    </div>
    <div>
        Bienvenido, {{ request.user.username }}
<form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="background:none; border:none; cursor:pointer;">
        Cerrar sesión
    </button>
</form>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <a href="{% url 'product_list' %}">📦 Productos</a>
        <a href="{% url 'inventory_list' %}">🏬 Inventario</a>
        <a href="{% url 'transfer_list' %}">🔁 Transferencias</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
