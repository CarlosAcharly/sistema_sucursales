{% extends 'cajero/base.html' %}
{% block content %}
<h2>Dieta: {{ diet.diet_base.name }}</h2>
<form method="post">
    {% csrf_token %}
    <table style="width:100%; border-collapse:collapse; background:white; border-radius:10px;">
        <thead style="background:#1e293b; color:white;">
            <tr>
                <th>Ingrediente</th>
                <th>Kilos</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr style="border-bottom:1px solid #e5e7eb;">
                <td>{{ item.product.name }}</td>
                <td>
                    <input type="number" step="0.01" name="kilos_{{ item.id }}" value="{{ item.kilos }}">
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit" style="background:#16a34a; color:white; padding:8px 12px; border-radius:5px; border:none; margin-top:15px;">
        Aplicar cambios
    </button>
</form>
{% endblock %}
