<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel SuperAdmin</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background-color: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        button.logout-btn {
            background: #dc2626;
            border: none;
            padding: 8px 14px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button.logout-btn:hover {
            background: #b91c1c;
        }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <div class="nav-left">
            <strong style="margin-right:30px;">SuperAdmin</strong>

            <a href="{% url 'superadmin_dashboard' %}">Dashboard</a>
            <a href="{% url 'branch_list' %}">Sucursales</a>
            <a href="{% url 'users:user_list' %}">Usuarios</a>
            <a href="#">Reportes</a>
        </div>

        <div class="nav-right">
            <span style="margin-right:15px;">
                {{ request.user.username }}
            </span>

            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    Cerrar sesión
                </button>
            </form>
        </div>

    </div>

    <!-- CONTENIDO -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
