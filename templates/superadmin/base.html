<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel SuperAdmin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
        }

        /* NAVBAR ESTILO FACEBOOK */
        .fb-navbar {
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fb-logo {
            background: #1877f2;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            margin-left: 20px;
        }

        .nav-link {
            color: #050505;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .nav-link:hover {
            background-color: #f0f2f5;
        }

        .nav-link.active {
            color: #1877f2;
            background-color: #e7f3ff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background-color: #f0f2f5;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .user-menu:hover {
            background-color: #e4e6e9;
        }

        .user-avatar {
            background: #1877f2;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .username {
            color: #050505;
            font-weight: 500;
            font-size: 14px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #1877f2;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .logout-btn:hover {
            background-color: #e7f3ff;
        }

        /* CONTENEDOR PRINCIPAL */
        .fb-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }

        /* CARD ESTILO FACEBOOK */
        .fb-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .fb-card-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e4e6eb;
        }

        .fb-card-header h2 {
            color: #050505;
            font-size: 20px;
            font-weight: 600;
        }

        .fb-card-header h3 {
            color: #050505;
            font-size: 18px;
            font-weight: 500;
        }

        /* BOTONES ESTILO FACEBOOK */
        .fb-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .fb-btn-primary {
            background-color: #1877f2;
            color: white;
        }

        .fb-btn-primary:hover {
            background-color: #166fe5;
        }

        .fb-btn-success {
            background-color: #42b72a;
            color: white;
        }

        .fb-btn-success:hover {
            background-color: #3ba126;
        }

        .fb-btn-secondary {
            background-color: #e4e6eb;
            color: #050505;
        }

        .fb-btn-secondary:hover {
            background-color: #d8dadf;
        }

        /* FORMULARIOS */
        .fb-form-group {
            margin-bottom: 16px;
        }

        .fb-form-group label {
            display: block;
            color: #606770;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .fb-input, .fb-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 15px;
            background: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .fb-input:focus, .fb-textarea:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }

        .fb-input::placeholder, .fb-textarea::placeholder {
            color: #8d949e;
        }

        .fb-checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fb-checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .fb-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1877f2;
        }

        /* TABLA ESTILO FACEBOOK */
        .fb-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .fb-table th {
            background-color: #f5f6f7;
            color: #606770;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #dddfe2;
        }

        .fb-table td {
            padding: 14px 16px;
            color: #050505;
            font-size: 14px;
            border-bottom: 1px solid #e4e6eb;
        }

        .fb-table tr:last-child td {
            border-bottom: none;
        }

        .fb-table tr:hover td {
            background-color: #f5f6f7;
        }

        /* BADGES */
        .fb-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .fb-badge-success {
            background-color: #e3f2e8;
            color: #1b7e3f;
        }

        .fb-badge-danger {
            background-color: #ffebe9;
            color: #b92b27;
        }

        /* ACCIONES EN TABLA */
        .fb-actions {
            display: flex;
            gap: 12px;
        }

        .fb-action-link {
            color: #1877f2;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: text-decoration 0.2s;
        }

        .fb-action-link:hover {
            text-decoration: underline;
        }

        .fb-action-link.warning {
            color: #b92b27;
        }

        /* GRID PARA DASHBOARD */
        .fb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .fb-stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fb-stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .fb-stat-card h4 {
            color: #606770;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .fb-stat-card h2 {
            color: #050505;
            font-size: 28px;
            font-weight: 600;
        }

        /* COLORES PARA ESTADÍSTICAS */
        .stat-blue { border-top: 3px solid #1877f2; }
        .stat-green { border-top: 3px solid #42b72a; }
        .stat-yellow { border-top: 3px solid #f7b928; }
        .stat-red { border-top: 3px solid #fa383e; }

        /* MENSAJES */
        .fb-alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .fb-alert-info {
            background-color: #e7f3ff;
            border: 1px solid #1877f2;
            color: #1877f2;
        }

        .fb-alert-success {
            background-color: #e3f2e8;
            border: 1px solid #42b72a;
            color: #1b7e3f;
        }

        .fb-alert-warning {
            background-color: #fff4e5;
            border: 1px solid #f7b928;
            color: #bd7b13;
        }

        .fb-alert-danger {
            background-color: #ffebe9;
            border: 1px solid #fa383e;
            color: #b92b27;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .fb-grid {
                grid-template-columns: 1fr;
            }
            
            .fb-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR ESTILO FACEBOOK -->
    <div class="fb-navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="fb-logo">PV</div>
                <div class="nav-links">
                    <a href="{% url 'superadmin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'superadmin_dashboard' %}active{% endif %}">
                        Dashboard
                    </a>
                    <a href="{% url 'branch_list' %}" class="nav-link {% if 'branch' in request.path %}active{% endif %}">
                        Sucursales
                    </a>
                    <a href="{% url 'users:user_list' %}" class="nav-link {% if 'user' in request.path %}active{% endif %}">
                        Usuarios
                    </a>
                    <a href="#" class="nav-link">
                        Reportes
                    </a>
                </div>
            </div>

            <div class="nav-right">
                <div class="user-menu">
                    <div class="user-avatar">
                        {{ request.user.username|first|upper }}
                    </div>
                    <span class="username">{{ request.user.username }}</span>
                </div>

                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">
                        Salir
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="fb-container">
        {% if messages %}
            {% for message in messages %}
                <div class="fb-alert fb-alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
